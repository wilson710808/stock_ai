<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StockAI - 美股投顧助手</title>
<script async src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" onerror="this.onerror=null;this.src='marked.min.js'"></script>
<script async src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js" onerror="this.onerror=null;this.src='lightweight-charts.min.js'"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#1a1a2e;--accent:#00C853;--accent-rgb:0,200,83;--accent-light:#69F0AE;--red:#FF5252;--blue:#448AFF;--bg:#f5f7fa;--card:#ffffff;--text:#1a1a2e;--text-secondary:#6b7280;--border:#e5e7eb;--shadow:0 4px 20px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:100px}
.header{position:fixed;top:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);padding:14px 20px;z-index:100;border-bottom:1px solid var(--border)}
.header-inner{max-width:600px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.logo{font-size:20px;font-weight:700}.logo span{color:var(--accent)}.logo-sub{font-size:12px;color:var(--text-secondary)}
.version-tag{display:inline-block;margin-left:8px;padding:2px 8px;font-size:11px;font-weight:600;color:var(--accent);background:rgba(var(--accent-rgb),.12);border:1px solid rgba(var(--accent-rgb),.35);border-radius:10px;vertical-align:middle;letter-spacing:.3px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
#userArea{display:flex;align-items:center;gap:8px}
.user-btn{padding:6px 12px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:13px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px}
.user-btn:active{transform:scale(.97)}
.user-dropdown{position:absolute;top:54px;right:20px;background:#fff;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.15);min-width:180px;z-index:200;overflow:hidden;display:none}
.user-dropdown.show{display:block}
.user-dd-item{padding:12px 16px;font-size:14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.user-dd-item:last-child{border:none}
.user-dd-item:hover{background:var(--bg)}
.main{max-width:600px;margin:0 auto;padding:80px 20px 20px}
.hero{text-align:center;padding:32px 0 24px}.hero-emoji{font-size:56px;margin-bottom:12px}.hero-title{font-size:24px;font-weight:600;margin-bottom:6px}.hero-subtitle{font-size:14px;color:var(--text-secondary)}
.search-container{margin-bottom:20px}.search-box{display:flex;gap:10px}
.ticker-input{flex:1;padding:14px 16px;font-size:16px;border:2px solid var(--border);border-radius:12px;background:var(--card);outline:none;font-family:inherit;text-transform:uppercase}.ticker-input:focus{border-color:var(--accent)}
.search-btn{width:52px;height:52px;border:none;background:var(--accent);border-radius:12px;font-size:20px;cursor:pointer}.search-btn:active{transform:scale(.95)}
.quick-chips{display:flex;gap:8px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:none}.quick-chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:20px;font-size:13px;color:var(--text-secondary);cursor:pointer}.chip:active{transform:scale(.96)}
.analysis-types{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px}
.type-btn{padding:14px 12px;background:var(--card);border:2px solid var(--border);border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;font-family:inherit}.type-btn:active{transform:scale(.98)}.type-btn.active{border-color:var(--accent);background:rgba(var(--accent-rgb),.08);color:var(--accent)}.type-icon{font-size:18px}
.loading{display:none;text-align:center;padding:48px 20px}.loading.show{display:block}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}@keyframes spin{to{transform:rotate(360deg)}}
.result-view{display:none}.result-view.show{display:block}
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:14px;color:var(--accent);background:none;border:none;cursor:pointer}
.ticker-badge{padding:6px 12px;background:var(--primary);color:#fff;border-radius:20px;font-size:13px;font-weight:600}
.result-card{background:var(--card);border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.result-title{font-size:16px;font-weight:600;margin-bottom:12px;color:var(--accent)}
.result-content{font-size:14px;line-height:1.8;color:var(--text);white-space:pre-wrap}
.recommendation{display:flex;align-items:center;justify-content:center;gap:16px;padding:20px;background:linear-gradient(135deg,var(--primary),#2d2d4a);border-radius:16px;margin-bottom:20px}
.rec-icon{font-size:36px}.rec-label{font-size:13px;opacity:.8}.rec-value{font-size:24px;font-weight:700}
.rec-buy{color:#4ADE80}.rec-hold{color:#FBBF24}.rec-sell{color:#F87171}.rec-watch{color:#F87171}
.action-row{display:flex;gap:12px}.action-btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit}.action-btn.secondary{background:var(--bg);color:var(--text)}.action-btn.primary{background:var(--accent);color:#fff}
.section{margin-top:32px}.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.section-title{font-size:16px;font-weight:600}
.history-list{display:flex;flex-direction:column;gap:10px}
.history-item{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);border-radius:12px;box-shadow:var(--shadow);cursor:pointer}
.history-ticker{width:48px;height:48px;background:linear-gradient(135deg,var(--accent),var(--accent-light));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.history-info{flex:1;min-width:0}.history-title{font-size:14px;font-weight:600}.history-type{font-size:12px;color:var(--text-secondary)}.history-arrow{font-size:18px;color:var(--border)}
.empty{text-align:center;padding:32px 20px;color:var(--text-secondary)}.empty-icon{font-size:40px;margin-bottom:8px}.empty-text{font-size:13px}
.chat-messages{display:flex;flex-direction:column;gap:12px;margin-bottom:20px;min-height:300px;max-height:calc(100vh - 260px);overflow-y:auto;scroll-behavior:smooth;padding-right:4px}.chat-messages::-webkit-scrollbar{width:4px}.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.chat-msg{max-width:85%;padding:14px 16px;border-radius:16px;font-size:14px;line-height:1.6}
.chat-msg.user{align-self:flex-end;background:var(--accent);color:#fff}.chat-msg.ai{align-self:flex-start;background:var(--card);box-shadow:var(--shadow)}
.chat-input-box{display:flex;gap:10px;position:sticky;bottom:0;background:var(--bg);padding:12px 0}
.chat-input{flex:1;padding:14px 16px;font-size:15px;border:2px solid var(--border);border-radius:24px;background:var(--card);outline:none;font-family:inherit}
.chat-send{width:48px;height:48px;border:none;background:var(--accent);border-radius:50%;font-size:18px;cursor:pointer}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--primary);color:#fff;padding:12px 24px;border-radius:24px;font-size:14px;opacity:0;transition:all .3s;z-index:300;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.disclaimer{margin-top:24px;padding:16px;background:#FFF3E0;border-radius:12px;font-size:12px;color:#E65100;line-height:1.6}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);backdrop-filter:blur(20px);display:flex;justify-content:space-around;padding:10px 0;padding-bottom:max(10px,env(safe-area-inset-bottom));border-top:1px solid var(--border);z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 20px;background:none;border:none;color:var(--text-secondary);font-size:10px;cursor:pointer}.nav-item.active{color:var(--accent)}.nav-item .icon{font-size:22px}
.page{display:none}.page.active{display:block}
.chart-container{background:var(--card);border-radius:16px;padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
.chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.chart-title{font-size:15px;font-weight:600}.chart-badge{font-size:11px;padding:4px 8px;background:var(--bg);border-radius:8px;color:var(--text-secondary)}
#chart{width:100%;height:280px;border-radius:8px;overflow:hidden}.chart-error{text-align:center;padding:40px;color:var(--text-secondary);font-size:13px}
.markdown-body{line-height:1.7;font-size:14px}.markdown-body h2{font-size:17px;font-weight:700;margin:20px 0 12px;border-bottom:2px solid var(--accent);padding-bottom:6px}.markdown-body h3{font-size:15px;font-weight:600;margin:16px 0 10px}.markdown-body table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13px}.markdown-body th,.markdown-body td{border:1px solid var(--border);padding:8px 10px;text-align:left}.markdown-body th{background:var(--bg);font-weight:600}.markdown-body tr:nth-child(even){background:var(--bg)}.markdown-body ul,.markdown-body ol{margin:8px 0;padding-left:20px}.markdown-body li{margin:6px 0}.markdown-body p{margin:10px 0}.markdown-body strong{font-weight:600}.markdown-body code{background:var(--bg);padding:2px 6px;border-radius:4px;font-size:12px}.markdown-body blockquote{border-left:3px solid var(--accent);padding-left:12px;margin:12px 0;color:var(--text-secondary)}
/* Portfolio */
.pf-summary{background:linear-gradient(135deg,#1a1a2e,#2d2d4a);border-radius:16px;padding:20px;margin-bottom:16px;color:#fff}
.pf-summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.pf-stat{text-align:center}.pf-stat-label{font-size:11px;opacity:.7;margin-bottom:4px}.pf-stat-value{font-size:18px;font-weight:700}.pf-stat-value.up{color:#22c55e}.pf-stat-value.down{color:#ef4444}
.pf-alloc{margin-top:16px}.pf-alloc-item{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}.pf-alloc-bar{flex:1;height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden}.pf-alloc-fill{height:100%;border-radius:4px;transition:width .3s}.pf-alloc-pct{width:40px;text-align:right;opacity:.8}
.holding-card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.holding-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}.holding-ticker{font-size:18px;font-weight:700}.holding-name{font-size:12px;color:#6b7280}.holding-current{font-size:18px;font-weight:700}.holding-change{font-size:12px;font-weight:600}
.holding-details{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;font-size:11px;padding-top:8px;border-top:1px solid #e5e7eb}.holding-detail-label{color:#6b7280}.holding-detail-value{font-weight:600}.holding-pnl{font-weight:700;font-size:13px}
.holding-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.h-btn{padding:7px 12px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;font-size:12px;cursor:pointer;font-family:inherit}.h-btn:active{transform:scale(.97)}.h-btn.buy{color:#22c55e;border-color:#22c55e}.h-btn.sell{color:#ef4444;border-color:#ef4444}.h-btn.alert{color:#448AFF;border-color:#448AFF}.h-btn.analyze{color:#00C853;border-color:#00C853}
.sl-tp-tag{display:inline-flex;align-items:center;gap:2px;font-size:10px;padding:2px 6px;border-radius:4px;margin-left:4px}.sl-tag{background:#fef2f2;color:#ef4444}.tp-tag{background:#f0fdf4;color:#22c55e}
.risk-warn{font-size:11px;padding:4px 8px;border-radius:4px;display:inline-flex;align-items:center;gap:4px;margin-top:6px}.risk-warn.high{background:#fef2f2;color:#ef4444}.risk-warn.mid{background:#fffbeb;color:#f59e0b}
/* Transaction Panel */
.tx-panel{position:fixed;top:0;right:0;bottom:0;width:85%;max-width:400px;background:#fff;z-index:600;box-shadow:-4px 0 30px rgba(0,0,0,.15);transform:translateX(100%);transition:transform .3s;overflow-y:auto}.tx-panel.open{transform:translateX(0)}
.tx-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);z-index:599;display:none}.tx-overlay.open{display:block}
.tx-panel-header{padding:20px;border-bottom:1px solid #e5e7eb;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.tx-panel-title{font-size:16px;font-weight:700}.tx-panel-close{background:none;border:none;font-size:24px;cursor:pointer;color:#6b7280}
.tx-item{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid #e5e7eb}.tx-type{padding:4px 8px;border-radius:6px;font-size:11px;font-weight:700}.tx-type.buy{background:#f0fdf4;color:#22c55e}.tx-type.sell{background:#fef2f2;color:#ef4444}.tx-type.dividend{background:#eff6ff;color:#3b82f6}.tx-type.deposit{background:#f5f3ff;color:#8b5cf6}
.tx-info{flex:1}.tx-ticker{font-size:14px;font-weight:600}.tx-detail{font-size:12px;color:#6b7280}.tx-amount{text-align:right;font-size:14px;font-weight:600}
/* Watchlist */
.wl-search{display:flex;gap:8px;padding:0 0 12px}.wl-search-input{flex:1;padding:12px 14px;font-size:15px;border:2px solid #e5e7eb;border-radius:12px;background:#fff;outline:none;font-family:inherit;text-transform:uppercase}.wl-search-input:focus{border-color:#00C853}
.wl-add-btn{padding:12px 16px;background:#00C853;color:#fff;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit}
.wl-toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}.wl-toolbar select,.wl-toolbar button{padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;font-size:12px;cursor:pointer;font-family:inherit}
.wl-card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;box-shadow:0 4px 20px rgba(0,0,0,.06)}
.wl-header{display:flex;justify-content:space-between;align-items:flex-start}.wl-ticker{font-size:18px;font-weight:700}.wl-name{font-size:12px;color:#6b7280}.wl-current{font-size:18px;font-weight:700}.wl-change{font-size:12px;font-weight:600}
.wl-note{margin-top:8px;padding:6px 10px;background:#f5f7fa;border-radius:6px;font-size:12px;color:#6b7280;display:flex;justify-content:space-between;align-items:center}.wl-note-text{flex:1;font-style:italic}
.wl-alerts{margin-top:8px;display:flex;gap:4px;flex-wrap:wrap}.wl-alert-tag{font-size:10px;padding:3px 8px;border-radius:4px;display:inline-flex;align-items:center;gap:4px;cursor:pointer}.wl-alert-tag.above{background:#f0fdf4;color:#22c55e}.wl-alert-tag.below{background:#fef2f2;color:#ef4444}
.wl-actions{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.wl-btn{padding:7px 12px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;font-size:12px;cursor:pointer;font-family:inherit}.wl-btn:active{transform:scale(.97)}.wl-btn.buy{color:#22c55e;border-color:#22c55e}.wl-btn.analyze{color:#00C853;border-color:#00C853}.wl-btn.remove{color:#ef4444;border-color:#ef4444}.wl-btn.note{color:#8b5cf6;border-color:#8b5cf6}.wl-btn.alert{color:#448AFF;border-color:#448AFF}
.wl-group-tag{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(0,200,83,.1);color:#00C853;font-weight:500}
.priority-tag{font-size:10px;padding:2px 6px;border-radius:4px;background:#fef2f2;color:#ef4444;font-weight:600}
.target-price-tag{font-size:10px;padding:2px 6px;border-radius:4px;margin-left:4px}.target-buy{background:#eff6ff;color:#3b82f6}.target-sell{background:#f0fdf4;color:#22c55e}
/* Market Bar */
.market-bar{display:flex;gap:12px;padding:12px 0;overflow-x:auto;scrollbar-width:none}.market-bar::-webkit-scrollbar{display:none}
.market-idx{flex-shrink:0;padding:10px 14px;background:var(--card);border-radius:10px;box-shadow:var(--shadow);min-width:120px}.market-idx-name{font-size:11px;color:var(--text-secondary);margin-bottom:4px}.market-idx-val{font-size:16px;font-weight:700}.market-idx-chg{font-size:11px;font-weight:600}
/* Sector donut */
.sector-donut{width:120px;height:120px;border-radius:50%;position:relative;display:inline-block;margin:0 auto}
.sector-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;font-size:12px;color:#fff}
.sector-legend{display:flex;flex-wrap:wrap;gap:4px;margin-top:12px;justify-content:center}.sector-legend-item{font-size:10px;display:flex;align-items:center;gap:4px}.sector-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
/* Health score */
.health-score{display:flex;align-items:center;gap:4px;margin-top:8px}.health-star{font-size:14px}
/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:500;display:flex;align-items:center;justify-content:center}
.modal-box{background:#fff;border-radius:16px;padding:24px;width:90%;max-width:380px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:600;margin-bottom:16px}
.modal-input{width:100%;padding:12px;border:2px solid #e5e7eb;border-radius:10px;font-size:15px;margin-bottom:12px;font-family:inherit;outline:none}.modal-input:focus{border-color:#00C853}
.modal-btn-row{display:flex;gap:10px;margin-top:16px}.modal-btn{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}.modal-btn.primary{background:#00C853;color:#fff}.modal-btn.danger{background:#ef4444;color:#fff}.modal-btn.cancel{background:#f5f7fa;color:#1a1a2e}
.modal-info{font-size:13px;color:#6b7280;margin-bottom:12px;line-height:1.5}.modal-cost{font-size:13px;padding:8px;background:#f5f7fa;border-radius:8px;margin-bottom:12px}
.modal-label{font-size:12px;font-weight:600;color:#6b7280;margin:10px 0 4px}.modal-row{display:flex;gap:8px}.modal-row input{flex:1}
.auth-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid var(--border)}.auth-tab{flex:1;padding:10px;background:none;border:none;font-size:14px;font-weight:600;cursor:pointer;color:var(--text-secondary);border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit}.auth-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.auth-switch{font-size:13px;color:var(--text-secondary);text-align:center;margin-top:12px}.auth-switch a{color:var(--accent);cursor:pointer;font-weight:600}
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
<!-- Header -->
<header class="header">
 <div class="header-inner">
  <div><div class="logo">Stock<span>AI</span><span id="appVersionTag" class="version-tag" title="Stock AI 版本">v2.0.0</span></div><div class="logo-sub">美股 AI 投顧助手</div></div>
  <div id="userArea"><span id="aiCtxIndicator" style="display:none;font-size:11px;background:rgba(59,130,246,.15);color:#60a5fa;padding:3px 8px;border-radius:6px;margin-right:8px"></span>
   <button class="h-btn" id="loginBtn" onclick="showAuthModal()" style="font-size:13px;padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;cursor:pointer">登錄</button>
  </div>
  <div class="user-dropdown" id="userDropdown">
   <div class="user-dd-item" onclick="showProfileModal()">👤 個人資料</div>
   <div class="user-dd-item" onclick="showPasswordModal()">🔑 修改密碼</div>
   <div class="user-dd-item" onclick="doLogout()">🚪 登出</div>
  </div>
 </div>
</header>

<!-- Home Page -->
<main class="main page active" id="homePage">
 <div class="hero"><div class="hero-emoji">📈</div><h1 class="hero-title">分析你的投資</h1><p class="hero-subtitle">輸入股票代碼，獲得專業分析</p></div>
 <div class="market-bar" id="marketBar"></div>
 <div class="search-container"><div class="search-box"><input type="text" class="ticker-input" id="tickerInput" placeholder="輸入代碼，如：AAPL"><button class="search-btn" id="searchBtn">🔍</button></div></div>
 <div class="quick-chips">
  <span class="chip" data-ticker="AAPL">AAPL 蘋果</span><span class="chip" data-ticker="NVDA">NVDA 輝達</span><span class="chip" data-ticker="MSFT">MSFT 微軟</span><span class="chip" data-ticker="TSLA">TSLA 特斯拉</span><span class="chip" data-ticker="META">META</span><span class="chip" data-ticker="GOOGL">GOOGL</span>
 </div>

<style>
.fav-summary{padding:10px 14px;background:#f3f4f6;border-radius:8px;font-size:12px;color:var(--text-secondary);margin-bottom:12px}
.fav-sector-group{margin-bottom:10px;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:#fff}
.fav-sector-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;background:linear-gradient(135deg,#f8fafc,#eff6ff);transition:background .2s}
.fav-sector-header:hover{background:linear-gradient(135deg,#e0e7ff,#ddd6fe)}
.fav-sector-left{display:flex;align-items:center;gap:8px;font-weight:600}
.fav-sector-icon{font-size:18px}
.fav-sector-name{font-size:15px;color:var(--text)}
.fav-sector-count{font-size:11px;color:var(--text-secondary);background:#fff;padding:2px 8px;border-radius:10px}
.fav-sector-arrow{font-size:12px;color:var(--text-secondary);transition:transform .2s}
.fav-sector-body{padding:8px 12px 12px;background:#fff}
.fav-ticker-group{margin:6px 0;border:1px solid #e5e7eb;border-radius:8px;background:#fafafa}
.fav-ticker-header{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;cursor:pointer;transition:background .15s}
.fav-ticker-header:hover{background:#f3f4f6}
.fav-ticker-left{display:flex;align-items:center;gap:8px}
.fav-ticker-badge{font-weight:700;color:var(--accent);font-size:14px;padding:2px 8px;background:rgba(99,102,241,.1);border-radius:6px}
.fav-ticker-count{font-size:11px;color:var(--text-secondary)}
.fav-ticker-arrow{font-size:11px;color:var(--text-secondary)}
.fav-ticker-body{padding:0 8px 8px}
.fav-record{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;margin-top:6px;background:#fff;border:1px solid #e5e7eb;border-radius:8px;cursor:pointer;transition:all .15s}
.fav-record:hover{background:#eff6ff;border-color:var(--accent);transform:translateX(2px)}
.fav-record-left{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0}
.fav-record-type{font-weight:600;font-size:13px;color:var(--text)}
.fav-record-note{font-size:11px;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fav-record-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.fav-record-date{font-size:11px;color:var(--text-secondary)}
.fav-rec-badge{display:inline-block;font-size:10px;background:rgba(0,200,83,.1);color:#00c853;padding:2px 6px;border-radius:4px;margin-left:4px}
.fav-remove-btn{background:none;border:none;color:#ef4444;font-size:14px;cursor:pointer;padding:4px 8px;border-radius:4px;transition:background .15s}
.fav-remove-btn:hover{background:rgba(239,68,68,.1)}
</style>
<script>
// ===== 收藏功能 =====
let lastAnalysisId = null;
let lastAnalysisTicker = null;
let lastAnalysisType = null;
let lastAnalysisContent = null;

// 保存分析信息供收藏使用
const originalRenderResult = renderResult;
renderResult = function(t, type, content, q) {
  originalRenderResult(t, type, content, q);
  lastAnalysisTicker = t;
  lastAnalysisType = type;
  lastAnalysisContent = content;
};

function showAddFavoriteDialog() {
  if (!lastAnalysisTicker) {
    showToast('請先分析股票');
    return;
  }
  showModal('<div class="modal-title">📚 收藏分析</div>' +
    '<div class="modal-label">股票</div>' +
    '<input class="modal-input" value="' + lastAnalysisTicker + '" disabled>' +
    '<div class="modal-label">備註（選填）</div>' +
    '<input class="modal-input" id="favNote" placeholder="添加備註...">' +
    '<div class="modal-btn-row">' +
    '<button class="modal-btn cancel" onclick="closeModal()">取消</button>' +
    '<button class="modal-btn primary" onclick="addFavorite()">收藏</button>' +
    '</div>');
}

async function addFavorite() {
  if (!lastAnalysisTicker) return;
  try {
    const note = $('favNote').value.trim();
    const resp = await fetch('api/favorites/add', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        analysis_id: lastAnalysisId || null,
        ticker: lastAnalysisTicker,
        type: lastAnalysisType,
        content: lastAnalysisContent,
        note
      })
    });
    const d = await resp.json();
    if (!d.success) throw new Error(d.error || '收藏失敗');
    closeModal();
    showToast('✅ 收藏成功');
    lastAnalysisId = null;
  } catch(e) {
    showToast('收藏失敗：' + (e.message || ''));
  }
}

// 板塊圖標映射
const SECTOR_ICONS = {
  '科技':'💻','通訊':'📡','消費':'🛒','金融':'🏦','醫療':'🏥',
  '能源':'⛽','工業':'🏭','材料':'🧪','地產':'🏠','公用':'⚡','其他':'📌'
};

async function renderFavorites() {
  const container = $('favoritesList');
  if (!container) return;

  if (!currentUser) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🔒</div><div class="empty-text">請先登錄</div></div>';
    return;
  }

  container.innerHTML = '<div class="loading show"><div class="spinner"></div></div>';

  try {
    const viewMode = $('favViewMode')?.value || 'sector';

    if (viewMode === 'sector') {
      // 板塊分組模式
      const r = await fetch('api/favorites/grouped');
      const d = await r.json();
      if (!d.success) throw new Error(d.error);

      if (!d.groups || !d.groups.length) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">📚</div><div class="empty-text">還沒有收藏的分析</div></div>';
        return;
      }

      container.innerHTML = '<div class="fav-summary">共 ' + d.total + ' 筆收藏，分佈於 ' + d.groups.length + ' 個板塊</div>' +
        d.groups.map(g => {
          const icon = SECTOR_ICONS[g.sector] || '📌';
          return '<div class="fav-sector-group">' +
            '<div class="fav-sector-header" onclick="toggleFavSector(this)">' +
              '<div class="fav-sector-left"><span class="fav-sector-icon">' + icon + '</span><span class="fav-sector-name">' + g.sector + '</span><span class="fav-sector-count">' + g.totalCount + ' 筆</span></div>' +
              '<span class="fav-sector-arrow">▸</span>' +
            '</div>' +
            '<div class="fav-sector-body" style="display:none">' +
              g.tickers.map(t => {
                return '<div class="fav-ticker-group">' +
                  '<div class="fav-ticker-header" onclick="toggleFavTicker(this)">' +
                    '<div class="fav-ticker-left"><span class="fav-ticker-badge">' + t.ticker + '</span><span class="fav-ticker-count">' + t.records.length + ' 筆分析</span></div>' +
                    '<span class="fav-ticker-arrow">▸</span>' +
                  '</div>' +
                  '<div class="fav-ticker-body" style="display:none">' +
                    t.records.map(f => {
                      const dateStr = f.created_at ? new Date(f.created_at).toLocaleDateString('zh-TW', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
                      const typeLabel = {overview:'全面分析',technical:'技術面',fundamental:'基本面',compare:'比較',risk:'風險',signal:'信號'}[f.type] || f.type;
                      const recBadge = f.recommendation ? '<span class="fav-rec-badge">' + f.recommendation + '</span>' : '';
                      return '<div class="fav-record" onclick="loadFavAnalysis(' + f.id + ',\'' + f.ticker + '\',\'' + f.type + '\')">' +
                        '<div class="fav-record-left">' +
                          '<span class="fav-record-type">' + typeLabel + '</span>' +
                          recBadge +
                          (f.note ? '<span class="fav-record-note">📝 ' + f.note + '</span>' : '') +
                        '</div>' +
                        '<div class="fav-record-right">' +
                          '<span class="fav-record-date">' + dateStr + '</span>' +
                          '<button class="fav-remove-btn" onclick="event.stopPropagation();removeFavorite(' + f.id + ')">✕</button>' +
                        '</div>' +
                      '</div>';
                    }).join('') +
                  '</div>' +
                '</div>';
              }).join('') +
            '</div>' +
          '</div>';
        }).join('');

    } else {
      // 最近收藏模式（平鋪按日期降序）
      const r = await fetch('api/favorites');
      const d = await r.json();
      if (!d.success) throw new Error(d.error);

      if (!d.favorites.length) {
        container.innerHTML = '<div class="empty"><div class="empty-icon">📚</div><div class="empty-text">還沒有收藏的分析</div></div>';
        return;
      }

      container.innerHTML = '<div class="fav-summary">共 ' + d.favorites.length + ' 筆收藏</div>' +
        d.favorites.map(f => {
          const dateStr = f.created_at ? new Date(f.created_at).toLocaleDateString('zh-TW', {year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
          const typeLabel = {overview:'全面分析',technical:'技術面',fundamental:'基本面',compare:'比較',risk:'風險',signal:'信號'}[f.type] || f.type;
          const recBadge = f.recommendation ? '<span class="fav-rec-badge">' + f.recommendation + '</span>' : '';
          return '<div class="wl-card" onclick="loadFavAnalysis(' + f.id + ',\'' + f.ticker + '\',\'' + f.type + '\')">' +
            '<div class="wl-header"><div><div class="wl-ticker">' + f.ticker + '</div><div class="wl-name">' + typeLabel + ' • ' + dateStr + '</div></div>' + recBadge + '</div>' +
            (f.note ? '<div class="wl-note"><div class="wl-note-text">📝 ' + f.note + '</div></div>' : '') +
            '<div class="wl-actions">' +
            '<button class="wl-btn analyze" onclick="event.stopPropagation();loadFavAnalysis(' + f.id + ',\'' + f.ticker + '\',\'' + f.type + '\')">📄 查看</button>' +
            '<button class="wl-btn remove" onclick="event.stopPropagation();removeFavorite(' + f.id + ')">✕ 移除</button>' +
            '</div></div>';
        }).join('');
    }
  } catch(e) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">❌</div><div class="empty-text">載入失敗</div></div>';
  }
}

// 板塊展開/收起
function toggleFavSector(el) {
  const body = el.nextElementSibling;
  const arrow = el.querySelector('.fav-sector-arrow');
  if (body.style.display === 'none') {
    body.style.display = 'block';
    arrow.textContent = '▾';
  } else {
    body.style.display = 'none';
    arrow.textContent = '▸';
  }
}

// 個股展開/收起
function toggleFavTicker(el) {
  const body = el.nextElementSibling;
  const arrow = el.querySelector('.fav-ticker-arrow');
  if (body.style.display === 'none') {
    body.style.display = 'block';
    arrow.textContent = '▾';
  } else {
    body.style.display = 'none';
    arrow.textContent = '▸';
  }
}

async function removeFavorite(id) {
  if (!confirm('確定要刪除此收藏？')) return;
  try {
    await fetch('api/favorites/' + id, { method: 'DELETE' });
    showToast('✅ 已移除');
    renderFavorites();
  } catch(e) {
    showToast('移除失敗');
  }
}

async function loadFavAnalysis(id, t, type) {
  try {
    const r = await fetch('api/favorites');
    const d = await r.json();
    const fav = d.favorites.find(f => f.id == id);
    if (fav && fav.content) {
      tickerInput.value = t;
      loading.classList.add('show');
      resultView.classList.remove('show');
      setTimeout(() => {
        renderResult(t, type || 'overview', fav.content, null);
        loading.classList.remove('show');
      }, 300);
    } else {
      tickerInput.value = t;
      if (type) currentType = type;
      showPage('home');
      analyze();
    }
  } catch(e) {
    showToast('載入失敗');
  }
}

// 修改 showPage 來處理收藏頁面
const originalShowPage = showPage;
showPage = function(p) {
  originalShowPage(p);
  if (p === 'favorites') renderFavorites();
};
</script>
