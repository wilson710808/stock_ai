<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>StockAI - 美股投顧助手</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js?v=1774713986673"></script>
  <script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #1a1a2e;
      --accent: #00C853;
      --accent-rgb: 0, 200, 83;
      --accent-light: #69F0AE;
      --red: #FF5252;
      --blue: #448AFF;
      --bg: #f5f7fa;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #6b7280;
      --border: #e5e7eb;
      --shadow: 0 4px 20px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 100px;
    }

    /* Header */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 16px 20px;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
    }
    .logo span { color: var(--accent); }
    .logo-sub { font-size: 12px; color: var(--text-secondary); }

    /* Main */
    .main {
      max-width: 600px;
      margin: 0 auto;
      padding: 80px 20px 20px;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 32px 0 24px;
    }
    .hero-emoji { font-size: 56px; margin-bottom: 12px; }
    .hero-title { font-size: 24px; font-weight: 600; margin-bottom: 6px; }
    .hero-subtitle { font-size: 14px; color: var(--text-secondary); }

    /* Search */
    .search-container { margin-bottom: 20px; }
    .search-box {
      display: flex;
      gap: 10px;
    }
    .ticker-input {
      flex: 1;
      padding: 14px 16px;
      font-size: 16px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: var(--card);
      outline: none;
      font-family: inherit;
      text-transform: uppercase;
    }
    .ticker-input:focus { border-color: var(--accent); }
    .search-btn {
      width: 52px;
      height: 52px;
      border: none;
      background: var(--accent);
      border-radius: 12px;
      font-size: 20px;
      cursor: pointer;
    }
    .search-btn:active { transform: scale(0.95); }

    /* Quick Chips */
    .quick-chips {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 0 12px;
      scrollbar-width: none;
    }
    .quick-chips::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      padding: 8px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      color: var(--text-secondary);
      cursor: pointer;
    }
    .chip:active { transform: scale(0.96); }

    /* Analysis Type */
    .analysis-types {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    .type-btn {
      padding: 14px 12px;
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: inherit;
    }
    .type-btn:active { transform: scale(0.98); }
    .type-btn.active {
      border-color: var(--accent);
      background: rgba(var(--accent-rgb), 0.08);
      color: var(--accent);
    }
    .type-icon { font-size: 18px; }

    /* Loading */
    .loading {
      display: none;
      text-align: center;
      padding: 48px 20px;
    }
    .loading.show { display: block; }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Result */
    .result-view { display: none; }
    .result-view.show { display: block; }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
    }
    .ticker-badge {
      padding: 6px 12px;
      background: var(--primary);
      color: #fff;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .result-card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .result-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--accent);
    }
    .result-content {
      font-size: 14px;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
    }

    /* Recommendation */
    .recommendation {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px;
      background: linear-gradient(135deg, var(--primary), #2d2d4a);
      border-radius: 16px;
      margin-bottom: 20px;
    }
    .rec-icon { font-size: 36px; }
    .rec-label { font-size: 13px; opacity: 0.8; }
    .rec-value { font-size: 24px; font-weight: 700; }
    .rec-buy { color: #4ADE80; }
    .rec-hold { color: #FBBF24; }
    .rec-sell { color: #F87171; }
    .rec-watch { color: #60A5FA; }

    /* Actions */
    .action-row {
      display: flex;
      gap: 12px;
    }
    .action-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-family: inherit;
    }
    .action-btn.secondary { background: var(--bg); color: var(--text); }
    .action-btn.primary { background: var(--accent); color: #fff; }

    /* History Section */
    .section { margin-top: 32px; }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .section-title { font-size: 16px; font-weight: 600; }
    .section-more { font-size: 13px; color: var(--accent); background: none; border: none; cursor: pointer; }

    .history-list { display: flex; flex-direction: column; gap: 10px; }
    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      background: var(--card);
      border-radius: 12px;
      box-shadow: var(--shadow);
      cursor: pointer;
    }
    .history-ticker {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }
    .history-info { flex: 1; min-width: 0; }
    .history-title { font-size: 14px; font-weight: 600; }
    .history-type { font-size: 12px; color: var(--text-secondary); }
    .history-arrow { font-size: 18px; color: var(--border); }

    /* Empty */
    .empty {
      text-align: center;
      padding: 32px 20px;
      color: var(--text-secondary);
    }
    .empty-icon { font-size: 40px; margin-bottom: 8px; }
    .empty-text { font-size: 13px; }

    /* Chat */
    .chat-view { display: none; }
    .chat-view.show { display: block; }

    .chat-messages {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }
    .chat-msg {
      max-width: 85%;
      padding: 14px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }
    .chat-msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
    }
    .chat-msg.ai {
      align-self: flex-start;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .chat-input-box {
      display: flex;
      gap: 10px;
      position: sticky;
      bottom: 0;
      background: var(--bg);
      padding: 12px 0;
    }
    .chat-input {
      flex: 1;
      padding: 14px 16px;
      font-size: 15px;
      border: 2px solid var(--border);
      border-radius: 24px;
      background: var(--card);
      outline: none;
      font-family: inherit;
    }
    .chat-send {
      width: 48px;
      height: 48px;
      border: none;
      background: var(--accent);
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--primary);
      color: #fff;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      opacity: 0;
      transition: all 0.3s;
      z-index: 300;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Disclaimer */
    .disclaimer {
      margin-top: 24px;
      padding: 16px;
      background: #FFF3E0;
      border-radius: 12px;
      font-size: 12px;
      color: #E65100;
      line-height: 1.6;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--border);
      z-index: 100;
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 8px 20px;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 10px;
      cursor: pointer;
    }
    .nav-item.active { color: var(--accent); }
    .nav-item .icon { font-size: 22px; }

    .page { display: none; }
    .page.active { display: block; }

    /* K Line Chart */
    .chart-container { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow); }
    .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .chart-title { font-size: 15px; font-weight: 600; }
    .chart-badge { font-size: 11px; padding: 4px 8px; background: var(--bg); border-radius: 8px; color: var(--text-secondary); }
    #chart { width: 100%; height: 280px; border-radius: 8px; overflow: hidden; }
    .chart-loading { text-align: center; padding: 60px; color: var(--text-secondary); }
    .chart-error { text-align: center; padding: 40px; color: var(--text-secondary); font-size: 13px; }

    /* Markdown 样式 */
    .markdown-body { line-height: 1.7; font-size: 14px; }
    .markdown-body h2 { font-size: 17px; font-weight: 700; margin: 20px 0 12px 0; color: var(--text); border-bottom: 2px solid var(--accent); padding-bottom: 6px; }
    .markdown-body h3 { font-size: 15px; font-weight: 600; margin: 16px 0 10px 0; color: var(--text); }
    .markdown-body table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 13px; }
    .markdown-body th, .markdown-body td { border: 1px solid var(--border); padding: 8px 10px; text-align: left; }
    .markdown-body th { background: var(--bg); font-weight: 600; }
    .markdown-body tr:nth-child(even) { background: var(--bg); }
    .markdown-body ul, .markdown-body ol { margin: 8px 0; padding-left: 20px; }
    .markdown-body li { margin: 6px 0; }
    .markdown-body p { margin: 10px 0; }
    .markdown-body strong { font-weight: 600; color: var(--text); }
    .markdown-body code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 12px; }
    .markdown-body blockquote { border-left: 3px solid var(--accent); padding-left: 12px; margin: 12px 0; color: var(--text-secondary); }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div>
        <div class="logo">Stock<span>AI</span></div>
        <div class="logo-sub">美股 AI 投顧助手</div>
      </div>
    </div>
  </header>

  <!-- Home Page -->
  <main class="main page active" id="homePage">
    <div class="hero">
      <div class="hero-emoji">📈</div>
      <h1 class="hero-title">分析你的投資</h1>
      <p class="hero-subtitle">輸入股票代碼，獲得專業分析</p>
    </div>

    <!-- Search -->
    <div class="search-container">
      <div class="search-box">
        <input type="text" class="ticker-input" id="tickerInput" placeholder="輸入代碼，如：AAPL">
        <button class="search-btn" id="searchBtn">🔍</button>
      </div>
    </div>

    <!-- Quick Chips -->
    <div class="quick-chips">
      <span class="chip" data-ticker="AAPL">AAPL 蘋果</span>
      <span class="chip" data-ticker="NVDA">NVDA 輝達</span>
      <span class="chip" data-ticker="MSFT">MSFT 微軟</span>
      <span class="chip" data-ticker="TSLA">TSLA 特斯拉</span>
      <span class="chip" data-ticker="META">META</span>
      <span class="chip" data-ticker="GOOGL">GOOGL</span>
    </div>

    <!-- Analysis Types (巴菲特/芒格风格) -->
    <div class="analysis-types">
      <button class="type-btn active" data-type="overview">
        <span class="type-icon">🏰</span>價值評估
      </button>
      <button class="type-btn" data-type="fundamental">
        <span class="type-icon">💰</span>財務分析
      </button>
      <button class="type-btn" data-type="technical">
        <span class="type-icon">📈</span>技術面
      </button>
      <button class="type-btn" data-type="risk">
        <span class="type-icon">⚠️</span>風險評估
      </button>
      <button class="type-btn" data-type="signal">
        <span class="type-icon">🎯</span>操作建議
      </button>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div class="loading-text">資深分析師正在分析...</div>
    </div>

    <!-- Result -->
    <div class="result-view" id="resultView"></div>

    <!-- History -->
    <div class="section">
      <div class="section-header">
        <h2 class="section-title">最近分析</h2>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>

    <div class="disclaimer">
      ⚠️ 風險提示：本系統提供的分析和建議僅供參考，不構成任何投資建議。投資有風險，請自行承擔後果。
    </div>
  </main>

  <!-- Chat Page -->
  <main class="main page" id="chatPage">
    <div class="section-header" style="margin-bottom: 16px;">
      <h2 class="section-title">💬 提問分析師</h2>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="chat-msg ai">
        你好！我是 StockAI 投顧助手。有任何關於美股的問題，歡迎隨時問我！
      </div>
    </div>
    <div class="chat-input-box">
      <input type="text" class="chat-input" id="chatInput" placeholder="問關於股票、投資的問題...">
      <button class="chat-send" id="chatSend">➤</button>
    </div>
  </main>

  <!-- Portfolio Page -->
  <main class="main page" id="portfolioPage">
    <div class="hero">
      <div class="hero-emoji">💼</div>
      <h1 class="hero-title">我的持倉</h1>
      <p class="hero-subtitle">模擬投資組合管理</p>
    </div>
    
    <!-- 资金概览 -->
    <div style="padding:0 16px 12px;">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:12px;">
        <div style="background:var(--card);padding:10px;border-radius:8px;text-align:center;">
          <div style="color:var(--text-secondary);">總資產</div>
          <div style="font-size:16px;font-weight:700;" id="totalAssets">$100,000</div>
        </div>
        <div style="background:var(--card);padding:10px;border-radius:8px;text-align:center;">
          <div style="color:var(--text-secondary);">持倉價值</div>
          <div style="font-size:16px;font-weight:700;" id="holdingsValue">$0</div>
        </div>
        <div style="background:var(--card);padding:10px;border-radius:8px;text-align:center;">
          <div style="color:var(--text-secondary);">可用現金</div>
          <div style="font-size:16px;font-weight:700;" id="cashValue">$100,000</div>
        </div>
      </div>
    </div>
    
    <!-- 操作栏 -->
    <div style="padding:0 16px 12px;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
          <input type="checkbox" id="selectAllPortfolio" onchange="toggleSelectAllPortfolio()"> 全選
        </label>
        <button class="type-btn" onclick="batchAnalyzePortfolio()">
          🎯 分析個股
        </button>
        <button class="type-btn" onclick="batchAnalyzePortfolio('signal6m')">
          📅 6個月建議
        </button>
      </div>
    </div>
    
    <div id="portfolioResult"></div>
  </main>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-page="home"><span class="icon">🏠</span>首頁</button>
    <button class="nav-item" data-page="chat"><span class="icon">💬</span>提問</button>
    <button class="nav-item" data-page="portfolio"><span class="icon">💼</span>持倉</button>
    <button class="nav-item" data-page="watchlist"><span class="icon">⭐</span>自選</button>
  </nav>

  <!-- Watchlist Page -->
  <main class="main page" id="watchlistPage">
    <div class="hero">
      <div class="hero-emoji">⭐</div>
      <h1 class="hero-title">我的自選股</h1>
      <p class="hero-subtitle">選擇股票進行分析</p>
    </div>
    
    <!-- 操作栏 -->
    <div style="padding: 0 16px 12px;">
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer;">
          <input type="checkbox" id="selectAllWatchlist" onchange="toggleSelectAll()"> 全選
        </label>
        <button class="type-btn" onclick="batchAnalyzeWatchlist()" style="flex:1;">
          🎯 分析個股
        </button>
        <button class="type-btn" onclick="batchAnalyzeWatchlist('signal6m')" style="flex:1;">
          📅 6個月建議
        </button>
      </div>
    </div>
    
    <div id="watchlistCards"></div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // State
    let currentType = 'overview';
    let currentTicker = '';
    let history = JSON.parse(localStorage.getItem('stock_history') || '[]');
    let chatHistory = [];
    let watchlist = JSON.parse(localStorage.getItem('stock_watchlist') || '[]');

    // Elements
    const tickerInput = document.getElementById('tickerInput');
    const searchBtn = document.getElementById('searchBtn');
    const loading = document.getElementById('loading');
    const resultView = document.getElementById('resultView');
    const historyList = document.getElementById('historyList');
    const toast = document.getElementById('toast');

    // Toast
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // Page Navigation
    function showPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.getElementById(page + 'Page').classList.add('active');
      document.querySelector(`.nav-item[data-page="${page}"]`)?.classList.add('active');
      if (page === 'watchlist') renderWatchlist();
    }

    // 插拔式：从 API 动态加载分析类型
    async function loadAnalysisTypes() {
      try {
        const res = await fetch('/api/config');
        const data = await res.json();
        if (!data.success) return;
        
        const types = data.config.analysisTypes
          .filter(t => t.enabled)
          .sort((a, b) => a.order - b.order);
        
        const container = document.querySelector('.analysis-types');
        if (!container) return;
        
        container.innerHTML = types.map((t, i) => `
          <button class="type-btn ${i === 0 ? 'active' : ''}" data-type="${t.id}" title="${t.description}">
            <span class="type-icon">${t.icon}</span>${t.label}
          </button>
        `).join('');
        
        // 重新绑定事件
        container.querySelectorAll('.type-btn').forEach(btn => {
          btn.onclick = () => {
            container.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentType = btn.dataset.type;
          };
        });

    // Search
    async function analyze() {
      const ticker = tickerInput.value.trim().toUpperCase();
      if (!ticker) {
        showToast('請輸入股票代碼');
        return;
      }

      currentTicker = ticker;
      loading.classList.add('show');
      resultView.classList.remove('show');

      // 逐步反饋
      loading.querySelector('.loading-text').textContent = '正在獲取股價數據...';

      try {
        // Step 1: 獲取報價
        const quoteRes = await fetch('/api/quote', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ticker })
        });
        const quote = await quoteRes.json();
        
        // 顯示報價卡片（即使分析還沒完成）
        if (quote && quote.success) {
          renderQuoteOnly(ticker, quote);
        }

        // Step 2: 開始分析
        loading.querySelector('.loading-text').textContent = '🤖 AI 分析師正在分析中...';
        
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ticker, type: currentType })
        });

        const data = await res.json();

        if (!data.success) throw new Error(data.error || '分析失敗');

        renderResult(ticker, currentType, data.content, quote);
        addToHistory(ticker, currentType);
        
        // 保存分析记录到记忆区域
        saveAnalysisRecord(ticker, currentType, data.content, quote);
        
        showToast('分析完成！');

      } catch (error) {
        showToast(error.message || '發生錯誤');
      } finally {
        loading.classList.remove('show');
      }
    }

    // Markdown 渲染函数
    function renderMarkdown(text) {
      // 尝试使用 marked.js
      if (typeof marked !== 'undefined') {
        try {
          return marked.parse(text);
        } catch(e) {
          console.error('marked error:', e);
        }
      }
      
      // 降级渲染：完整格式化
      let html = text;
      
      // 处理表格
      const tableRegex = /\|(.*)\|\n\|[-\s|]+\|\n((?:\|.*\|\n?)+)/g;
      html = html.replace(tableRegex, (match, header, rows) => {
        const headers = header.split('|').filter(h => h.trim()).map(h => `<th>${h.trim()}</th>`).join('');
        const rowsHtml = rows.trim().split('\n').map(row => {
          const cells = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
          return `<tr>${cells}</tr>`;
        }).join('');
        return `<table style="width:100%;border-collapse:collapse;margin:12px 0;"><thead><tr>${headers}</tr></thead><tbody>${rowsHtml}</tbody></table>`;
      });
      
      // 处理简单表格（只有一行表头）
      const simpleTableRegex = /\|(.*)\|\n\|[-\s|]+\|\n\|(.*)\|/g;
      html = html.replace(simpleTableRegex, (match, header, row) => {
        const headers = header.split('|').filter(h => h.trim()).map(h => `<th style="border:1px solid #ddd;padding:8px;background:#f5f5f5;">${h.trim()}</th>`).join('');
        const cells = row.split('|').filter(c => c.trim()).map(c => `<td style="border:1px solid #ddd;padding:8px;">${c.trim()}</td>`).join('');
        return `<table style="width:100%;border-collapse:collapse;margin:12px 0;"><thead><tr>${headers}</tr></thead><tbody><tr>${cells}</tr></tbody></table>`;
      });
      
      // 处理标题
      html = html.replace(/## (.*)/g, '<h2 style="font-size:17px;font-weight:700;margin:16px 0 8px 0;color:#333;border-bottom:2px solid #007AFF;padding-bottom:4px;">$1</h2>');
      html = html.replace(/### (.*)/g, '<h3 style="font-size:15px;font-weight:600;margin:12px 0 6px 0;color:#333;">$1</h3>');
      
      // 处理粗体
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong style="font-weight:700;">$1</strong>');
      
      // 处理列表
      html = html.replace(/^- (.*)$/gm, '<li style="margin:4px 0;">$1</li>');
      
      // 处理分隔线
      html = html.replace(/---/g, '<hr style="border:none;border-top:1px solid #eee;margin:16px 0;">');
      
      // 处理换行
      html = html.replace(/\n\n/g, '</p><p style="margin:8px 0;">');
      html = html.replace(/\n/g, '<br>');
      
      return html;
    }

    // K 線圖
    let chart = null;
    async function loadChart(ticker) {
      const chartEl = document.getElementById('chart');
      const badge = document.getElementById('chartBadge');
      if (!chartEl) return;
      
      // 检查 LightweightCharts 是否加载
      if (typeof LightweightCharts === 'undefined') {
        chartEl.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary);">K線圖庫載入中...</div>';
        // 等待库加载
        await new Promise(resolve => setTimeout(resolve, 1000));
        if (typeof LightweightCharts === 'undefined') {
          chartEl.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-secondary);">⚠️ K線圖庫載入失敗，請重新整理頁面</div>';
          return;
        }
      }
      
      try {
        const res = await fetch('/api/chart/' + ticker);
        const data = await res.json();
        
        if (data.success && data.candles && data.candles.length > 0) {
          // 初始化圖表
          if (chart) chart.remove();
          
          chart = LightweightCharts.createChart(chartEl, {
            width: chartEl.clientWidth,
            height: 280,
            layout: { backgroundColor: '#ffffff', textColor: '#333' },
            grid: { vertLines: { color: '#e5e7eb' }, horzLines: { color: '#e5e7eb' } },
            crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
            rightPriceScale: { borderColor: '#e5e7eb' },
            timeScale: { borderColor: '#e5e7eb' }
          });
          
          // K 線
          const candlestickSeries = chart.addCandlestickSeries({
            upColor: '#26a69a',
            downColor: '#ef5350',
            borderUpColor: '#26a69a',
            borderDownColor: '#ef5350',
            wickUpColor: '#26a69a',
            wickDownColor: '#ef5350'
          });
          candlestickSeries.setData(data.candles);
          
          chart.timeScale().fitContent();
          badge.textContent = '✅ 實時數據';
          badge.style.color = 'var(--accent)';
          
          // 響應式
          window.addEventListener('resize', () => {
            if (chart) chart.resize(chartEl.clientWidth, 280);
          });
        } else {
          chartEl.innerHTML = '<div class="chart-error">📊 K 線圖需要 Alpha Vantage API Key<br><small>請在 .env 設置 ALPHA_VANTAGE_KEY</small></div>';
          badge.textContent = '⚠️ 需要 API';
        }
      } catch (e) {
        chartEl.innerHTML = '<div class="chart-error">載入失敗</div>';
        badge.textContent = '❌ 錯誤';
      }
    }

    // 通用批量分析函数（带进度条）
    async function runBatchAnalysis(tickers, type, mode) {
      const total = tickers.length;
      let completed = 0;
      
      // 显示进度条
      showProgressBar(`分析中... (0/${total})`);
      
      for (const ticker of tickers) {
        try {
          const res = await fetch('/api/analyze', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ticker, type })
          });
          
          const data = await res.json();
          
          if (data.success) {
            let recommendation = '';
            if (data.content.includes('最終建議')) {
              const match = data.content.match(/\*\*最終建議：\*\* (.*?)(?:\n|$)/);
              if (match) recommendation = match[1].trim();
            }
            if (!recommendation && data.content.includes('當前建議')) {
              const match = data.content.match(/\*\*當前建議：\*\* (.*?)(?:\n|$)/);
              if (match) recommendation = match[1].trim();
            }
            
            const analysis = {
              recommendation,
              date: Date.now(),
              type,
              content: data.content
            };
            
            if (mode === 'watchlist') {
              watchlistAnalysis[ticker] = analysis;
              localStorage.setItem('stock_watchlist_analysis', JSON.stringify(watchlistAnalysis));
            } else if (mode === 'portfolio') {
              portfolioAnalysis[ticker] = analysis;
              localStorage.setItem('stock_portfolio_analysis', JSON.stringify(portfolioAnalysis));
            }
          }
        } catch (e) {
          console.error(ticker + ' 分析失败:', e);
        }
        
        completed++;
        updateProgressBar(`分析中... (${completed}/${total})`, completed / total);
      }
      
      hideProgressBar();
      showToast('✅ 分析完成！');
    }

    // ========== 投資組合功能 ==========
    let portfolio = JSON.parse(localStorage.getItem('stock_portfolio') || '[]');
    let transactions = JSON.parse(localStorage.getItem('stock_transactions') || '[]');
    let totalCash = 100000; // 模擬現金 $100,000
    let cash = parseFloat(localStorage.getItem('stock_cash') || totalCash);

    function addToPortfolio(ticker, shares, buyPrice) {
      const cost = shares * buyPrice;
      
      // 檢查現金是否足夠
      if (cost > cash) {
        showToast(`現金不足！需要 $${cost.toFixed(2)}，目前只有 $${cash.toFixed(2)}`);
        return false;
      }
      
      // 扣除現金
      cash -= cost;
      localStorage.setItem('stock_cash', cash.toString());
      
      // 更新持倉
      const existing = portfolio.find(p => p.ticker === ticker);
      if (existing) {
        const totalShares = existing.shares + shares;
        const totalCost = existing.shares * existing.buyPrice + shares * buyPrice;
        existing.shares = totalShares;
        existing.buyPrice = totalCost / totalShares;
        existing.transactions = existing.transactions || [];
        existing.transactions.push({ type: 'buy', shares, price: buyPrice, date: Date.now() });
      } else {
        portfolio.push({ 
          ticker, 
          shares, 
          buyPrice, 
          date: Date.now(),
          transactions: [{ type: 'buy', shares, price: buyPrice, date: Date.now() }]
        });
      }
      
      // 記錄交易
      transactions.push({ type: 'buy', ticker, shares, price: buyPrice, cost, date: Date.now() });
      
      localStorage.setItem('stock_portfolio', JSON.stringify(portfolio));
      localStorage.setItem('stock_transactions', JSON.stringify(transactions));
      showToast(`✅ 已買入 ${ticker} ${shares} 股 @ $${buyPrice}，花費 $${cost.toFixed(2)}`);
      return true;
    }
    
    function sellStock(ticker, shares) {
      const holding = portfolio.find(p => p.ticker === ticker);
      if (!holding) return;
      
      // 獲取當前股價
      fetch('/api/quote', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ticker })
      }).then(r => r.json()).then(quote => {
        if (!quote.success) {
          showToast('無法獲取當前價格');
          return;
        }
        
        const currentPrice = quote.price;
        const sellShares = Math.min(shares, holding.shares);
        const revenue = sellShares * currentPrice;
        const profit = (currentPrice - holding.buyPrice) * sellShares;
        
        // 更新持倉
        holding.shares -= sellShares;
        if (holding.shares <= 0) {
          portfolio = portfolio.filter(p => p.ticker !== ticker);
        }
        
        // 記錄交易
        transactions.push({ 
          type: 'sell', 
          ticker, 
          shares: sellShares, 
          price: currentPrice, 
          revenue,
          profit,
          date: Date.now() 
        });
        
        // 增加現金
        cash += revenue;
        
        localStorage.setItem('stock_portfolio', JSON.stringify(portfolio));
        localStorage.setItem('stock_transactions', JSON.stringify(transactions));
        localStorage.setItem('stock_cash', cash.toString());
        
        const profitText = profit >= 0 ? `賺 $${profit.toFixed(2)}` : `虧 $${Math.abs(profit).toFixed(2)}`;
        showToast(`✅ 已賣出 ${ticker} ${sellShares} 股 @ $${currentPrice}，${profitText}`);
        
        renderPortfolio();
      });
    }

          body: JSON.stringify({ messages: [{ role: 'user', content: msg }] })
        });
        const data = await res.json();

        chatMessages.lastElementChild.remove();
        chatMessages.innerHTML += `<div class="chat-msg ai markdown-body">${renderMarkdown(data.content)}</div>`;
        chatMessages.scrollTop = chatMessages.scrollHeight;

      } catch (error) {
        chatMessages.lastElementChild.remove();
        chatMessages.innerHTML += `<div class="chat-msg ai">發生錯誤，請稍後再試</div>`;
      }
    }

    chatSend.onclick = sendChat;
    chatInput.onkeypress = e => { if (e.key === 'Enter') sendChat(); };

    // Portfolio
    async function analyzePortfolio() {
      const input = document.getElementById('portfolioInput').value.trim();
      if (!input) {
        showToast('請輸入持倉');
        return;
      }

      const resultDiv = document.getElementById('portfolioResult');
      resultDiv.innerHTML = '<div class="loading show"><div class="spinner"></div></div>';

      try {
        const res = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ticker: input, type: 'portfolio' })
        });
        const data = await res.json();

        if (!data.success) throw new Error(data.error);

        resultDiv.innerHTML = `
          <div class="result-card">
            <div class="result-title">💼 持倉分析建議</div>
            <div class="result-content markdown-body">${renderMarkdown(data.content)}</div>
          </div>
        `;

      } catch (error) {
        resultDiv.innerHTML = `<div class="empty"><div class="empty-icon">❌</div><div class="empty-text">${error.message}</div></div>`;
      }
    }

    document.getElementById('analyzePortfolioBtn').onclick = analyzePortfolio;
    
    // Portfolio page load
    const portfolioPage = document.getElementById('portfolioPage');
    const observer = new MutationObserver(() => {
      if (portfolioPage.classList.contains('active')) {
        renderPortfolio();
      }
    });
    observer.observe(portfolioPage, { attributes: true, attributeFilter: ['class'] });

    // Events
    searchBtn.onclick = analyze;
    tickerInput.onkeypress = e => { if (e.key === 'Enter') analyze(); };

    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.onclick = () => showPage(btn.dataset.page);
    });

    document.querySelectorAll('.chip').forEach(chip => {
      chip.onclick = () => {
        tickerInput.value = chip.dataset.ticker;
        analyze();
      };
    });

    // Init
    renderHistory();
  </script>
</body>
</html>
