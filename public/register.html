<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>註冊新帳號 - Stock AI</title>
    <style>
        /* 與 login.html 相同 */
        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #1a1a2e;
        }
        .container {
            width: 100%;
            max-width: 440px;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
            border: 1px solid #e5e7eb;
        }
        h1 {
            font-size: 22px;
            font-weight: 600;
            text-align: center;
            color: #1f2937;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            background: white;
            font-family: inherit;
        }
        input:focus {
            border-color: #0C63E4;
            outline: none;
            box-shadow: 0 0 0 3px rgba(12, 99, 228, 0.15);
        }
        button {
            width: 100%;
            background: #28a745;
            color: white;
            border: none;
            padding: 14px 16px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #218838;
        }
        button:disabled {
            background: #a3e6b5;
            cursor: not-allowed;
        }
        .error-message {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 8px;
            text-align: center;
        }
        .info-message {
            color: #6c757d;
            font-size: 14px;
            margin-top: 16px;
            text-align: center;
        }
        a {
            color: #007BFF;
            text-decoration: none;
            font-size: 14px;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="text-align:center;font-size:11px;color:#9ca3af;margin-bottom:14px;letter-spacing:.4px">
            <span id="appVersionTag" style="display:inline-block;padding:2px 10px;border:1px solid #d1d5db;border-radius:10px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:#22c55e;background:#f0fdf4">v2.0.0</span>
        </div>
        <h1>建立新帳號</h1>
        <form id="registerForm">
            <div class="form-group">
                <label for="username">用戶名</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">密碼</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="confirmPassword">確認密碼</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required>
            </div>
            <div id="errorMessage" class="error-message"></div>
            <button type="submit" id="registerBtn">註冊</button>
        </form>
        <div class="info-message">
            <a href="login.html">返回登入頁面</a>
        </div>
    </div>

    <script>
        fetch('api/version').then(r=>r.json()).then(d=>{
            if (d && d.success && d.version) {
                const tag = document.getElementById('appVersionTag');
                if (tag) tag.textContent = 'v' + d.version;
            }
        }).catch(()=>{});

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (password !== confirmPassword) {
                document.getElementById('errorMessage').textContent = '密碼不一致';
                return;
            }
            
            document.getElementById('registerBtn').disabled = true;
            document.getElementById('errorMessage').textContent = '';
            
            try {
                const response = await fetch('api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                
                if (!data.success) {
                    document.getElementById('errorMessage').textContent = data.error || '註冊失敗';
                } else {
                    // 註冊成功，跳轉到登入頁
                    window.location.href = 'login.html?message=註冊成功！請登入';
                }
            } catch (err) {
                document.getElementById('errorMessage').textContent = '註冊過程發生錯誤';
            } finally {
                document.getElementById('registerBtn').disabled = false;
            }
        });
    </script>
</body>
</html>
