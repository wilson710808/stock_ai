<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock AI 最終測試頁面</title>
<style>
body {
    font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f7fa;
    color: #1a1a2e;
    max-width: 900px;
    margin: 0 auto;
    padding: 24px;
}
.header {
    background: linear-gradient(135deg, #1a1a2e 0%, #2d2d4a 100%);
    color: white;
    padding: 24px;
    border-radius: 16px;
    margin-bottom: 20px;
}
.header h1 {
    margin: 0 0 8px 0;
}
.header p {
    opacity: 0.85;
    margin: 0;
}
.input-section {
    margin-bottom: 24px;
}
.ticker-input {
    width: 400px;
    padding: 14px 16px;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    font-size: 16px;
    font-family: inherit;
    text-transform: uppercase;
}
.ticker-input:focus {
    border-color: #00C853;
    outline: none;
}
.btn {
    background: #00C853;
    color: white;
    border: none;
    padding: 14px 24px;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-left: 10px;
}
.btn:active { transform: scale(0.97); }
.status {
    padding: 12px 16px;
    border-radius: 12px;
    margin-bottom: 20px;
}
.status.loading { background: #FFF3E0; color: #E65100; }
.status.success { background: #E8F5E9; color: #1B5E20; }
.status.error { background: #FFEBEE; color: #B71C1C; }
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 24px;
}
.card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,.06);
}
.card h3 {
    margin-top: 0;
    color: #00C853;
}
.data-section {
    display: none;
}
.data-section.active {
    display: block;
}
.tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
}
.tab {
    padding: 10px 18px;
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 20px;
    cursor: pointer;
}
.tab.active {
    background: #00C853;
    color: white;
    border-color: #00C853;
}
pre {
    background: #f9f9f9;
    padding: 16px;
    border-radius: 12px;
    overflow-x: auto;
    font-size: 13px;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
}
th, td {
    border: 1px solid #e5e7eb;
    padding: 8px 10px;
    text-align: left;
}
th { background: #f9fafb; font-weight: 600; }
.moat-pie {
    float: right;
    width: 140px;
    height: 140px;
}
</style>
</head>
<body>
<div class="header">
    <h1>🏰 巴菲特/芒格 價值投資分析系統</h1>
    <p>完全解決數據缺失問題 - 包含護城河、財務、估值、管理層、風險提示</p>
</div>

<div class="input-section">
    <input id="ticker" class="ticker-input" value="AAPL" placeholder="輸入股票代碼">
    <button id="analyzeBtn" class="btn">開始分析</button>
</div>

<div id="status" class="status" style="display:none;"></div>

<div class="tabs">
    <button class="tab active" data-tab="raw">📊 原始數據</button>
    <button class="tab" data-tab="analysis">📈 AI分析報告</button>
</div>

<div id="rawData" class="data-section active">
    <h2>原始數據預覽</h2>
    <div class="grid">
        <div class="card">
            <h3>🏰 經濟護城河</h3>
            <svg class="moat-pie" viewBox="0 0 140 140" id="moatPie"></svg>
            <div id="moatTable"></div>
        </div>
        <div class="card">
            <h3>💰 財務指標</h3>
            <div id="financialTable"></div>
        </div>
        <div class="card">
            <h3>📊 估值與安全邊際</h3>
            <div id="valuationTable"></div>
        </div>
        <div class="card">
            <h3>👔 管理層評估</h3>
            <div id="managementTable"></div>
        </div>
        <div class="card" style="grid-column: 1 / 3;">
            <h3>⚠️ 風險提示</h3>
            <ul id="risksList"></ul>
        </div>
    </div>
    <details>
        <summary>查看完整 JSON 數據</summary>
        <pre id="fullJson"></pre>
    </details>
</div>

<div id="aiAnalysis" class="data-section">
    <h2>AI 分析報告</h2>
    <div class="card">
        <div id="analysisContent"></div>
    </div>
</div>

<script>
let currentData = null;
let ticker = "AAPL";

document.getElementById('analyzeBtn').addEventListener('click', doAnalyze);
document.getElementById('ticker').addEventListener('keypress', e => e.key === 'Enter' && doAnalyze());
document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const tab = btn.dataset.tab;
        document.querySelectorAll('.data-section').forEach(el => el.classList.remove('active'));
        document.getElementById(tab === 'raw' ? 'rawData' : 'aiAnalysis').classList.add('active');
    });
});

function showStatus(text, type = 'loading') {
    const el = document.getElementById('status');
    el.textContent = text;
    el.className = 'status ' + type;
    el.style.display = 'block';
}

function renderMoatPie(moatData) {
    const svg = document.getElementById('moatPie');
    const data = moatData;
    let html = '<circle cx="70" cy="70" r="65" fill="#f0f0f0" />';
    
    const colors = {'✅':'#00C853', '⚠️':'#FFC107', '❌':'#F44336'};
    const keys = ['brand', 'cost', 'network', 'switching'];
    const values = keys.map(k => data[k] === '✅' ? 1 : 0.3);
    const total = values.reduce((a, b) => a + b, 0);
    
    let current = -Math.PI/2;
    let cx = 70, cy = 70, r = 60;
    
    for (let i = 0; i < keys.length; i++) {
        const angle = (values[i]/total) * 2 * Math.PI;
        const x1 = cx + r * Math.cos(current);
        const y1 = cy + r * Math.sin(current);
        const x2 = cx + r * Math.cos(current + angle);
        const y2 = cy + r * Math.sin(current + angle);
        const large = angle > Math.PI ? 1 : 0;
        
        html += `<path d="M ${cx} ${cy} L ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} Z" fill="${colors[data[keys[i]]]}" />`;
        current += angle;
    }
    
    svg.innerHTML = html;
}

function renderMoatTable(moat) {
    const details = moat.moat_details;
    const table = `<table>
        <tr><th>護城河類型</th><th>存在與否</th><th>說明</th><th>評分</th></tr>
        <tr><td>品牌價值</td><td>${moat.moat.brand}</td><td>${details.brand.description}</td><td>${details.brand.score}/5</td></tr>
        <tr><td>成本優勢</td><td>${moat.moat.cost}</td><td>${details.cost.description}</td><td>${details.cost.score}/5</td></tr>
        <tr><td>網絡效應</td><td>${moat.moat.network}</td><td>${details.network.description}</td><td>${details.network.score}/5</td></tr>
        <tr><td>轉換成本</td><td>${moat.moat.switching}</td><td>${details.switching.description}</td><td>${details.switching.score}/5</td></tr>
        <tr><th colspan="3">總體護城河評級</th><th>${moat.overall_moat_rating}</th></tr>
    </table>`;
    document.getElementById('moatTable').innerHTML = table;
}

function renderFinancialTable(fin) {
    const table = `<table>
        <tr><th>財務指標</th><th>數值</th><th>標準</th><th>評估</th></tr>
        <tr><td>ROE (股東權益報酬率)</td><td>${fin.metrics.roe}%</td><td>>15%</td><td>${fin.metrics.roe >15?'✅':'⚠️'}</td></tr>
        <tr><td>ROIC (資本報酬率)</td><td>${fin.metrics.roic}%</td><td>>12%</td><td>${fin.metrics.roic >12?'✅':'⚠️'}</td></tr>
        <tr><td>毛利率</td><td>${fin.metrics.avgGrossMargin}%</td><td>>40%</td><td>${fin.metrics.avgGrossMargin >40?'✅':'⚠️'}</td></tr>
        <tr><td>淨利率</td><td>${fin.metrics.avgNetMargin}%</td><td>>10%</td><td>${fin.metrics.avgNetMargin >10?'✅':'⚠️'}</td></tr>
        <tr><td>負債率</td><td>${fin.metrics.debt_ratio}</td><td><0.5</td><td>${fin.metrics.debt_ratio <0.5?'✅':'⚠️'}</td></tr>
    </table>`;
    document.getElementById('financialTable').innerHTML = table;
}

function renderValuationTable(val) {
    const table = `<table>
        <tr><th>估值指標</th><th>數值</th><th>說明</th></tr>
        <tr><td>P/E (本益比)</td><td>${val.valuation.pe_ratio}</td><td>${val.valuation.pe_rating}</td></tr>
        <tr><td>PEG (成長性指標)</td><td>${val.valuation.peg_ratio}</td><td>${val.valuation.peg_rating}</td></tr>
        <tr><td>內在價值區間</td><td>${val.valuation.intrinsic_value.low} - ${val.valuation.intrinsic_value.high}</td><td>安全邊際: ${val.valuation.margin_of_safety}</td></tr>
    </table>`;
    document.getElementById('valuationTable').innerHTML = table;
}

function renderManagementTable(mgmt) {
    const table = `<table>
        <tr><th>管理層面相</th><th>評級</th><th>說明</th></tr>
        <tr><td>誠信度</td><td>${mgmt.management.integrity.rating}</td><td>${mgmt.management.integrity.note}</td></tr>
        <tr><td>資本配置</td><td>${mgmt.management.capital_allocation.rating}</td><td>${mgmt.management.capital_allocation.note}</td></tr>
        <tr><td>股東導向</td><td>${mgmt.management.shareholder_focus.rating}</td><td>${mgmt.management.shareholder_focus.note}</td></tr>
    </table>`;
    document.getElementById('managementTable').innerHTML = table;
}

function renderRisksList(risks) {
    const list = risks.risks.map(r => `<li>${r}</li>`).join('');
    document.getElementById('risksList').innerHTML = list;
}

async function doAnalyze() {
    ticker = document.getElementById('ticker').value.trim().toUpperCase();
    if (!ticker) return;
    
    showStatus('🔍 正在獲取數據，最多重試3次...');
    try {
        const res = await fetch(`/api/analyze/${ticker}`, { method: 'POST' });
        currentData = await res.json();
        
        // 渲染所有表格
        renderMoatTable(currentData.rawData.moat);
        renderFinancialTable(currentData.rawData.financial);
        renderValuationTable(currentData.rawData.valuation);
        renderManagementTable(currentData.rawData.management);
        renderRisksList(currentData.rawData.risks);
        renderMoatPie(currentData.rawData.moat.moat);
        
        // 顯示完整 JSON
        document.getElementById('fullJson').textContent = JSON.stringify(currentData, null, 2);
        
        // 渲染 AI 分析
        if (currentData.analysis) {
            const html = currentData.analysis
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
            document.getElementById('analysisContent').innerHTML = html;
        }
        
        if (currentData.status.notes.length > 0) {
            showStatus('⚠️ ' + currentData.status.notes.join(', '), 'error');
        } else {
            showStatus('✅ 數據完整性確認！', 'success');
        }
    } catch (e) {
        showStatus('❌ 錯誤: ' + e.message, 'error');
    }
}

// 頁面加載時自動執行一次
doAnalyze();
</script>
</body>
</html>
