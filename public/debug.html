<!DOCTYPE html>
<html>
<head>
  <title>StockAI 诊断</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .card { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; }
    .ok { color: green; }
    .error { color: red; }
    h2 { margin-top: 0; }
  </style>
</head>
<body>
  <h1>🔧 StockAI 诊断工具</h1>
  
  <div class="card">
    <h2>API 连接测试</h2>
    <div id="apiTest">检查中...</div>
  </div>
  
  <div class="card">
    <h2>配置加载</h2>
    <div id="configTest">检查中...</div>
  </div>
  
  <div class="card">
    <h2>浏览器信息</h2>
    <div id="browserInfo"></div>
  </div>

  <script>
    // 测试 API
    fetch('api/health')
      .then(r => r.json())
      .then(d => {
        document.getElementById('apiTest').innerHTML = 
          '<span class="ok">✅ API 正常</span><br>' +
          'Model: ' + d.model;
      })
      .catch(e => {
        document.getElementById('apiTest').innerHTML = 
          '<span class="error">❌ API 连接失败: ' + e.message + '</span>';
      });

    // 测试配置
    fetch('api/config')
      .then(r => r.json())
      .then(d => {
        const types = d.config.analysisTypes.filter(t => t.enabled).length;
        document.getElementById('configTest').innerHTML = 
          '<span class="ok">✅ 配置加载成功</span><br>' +
          '分析类型: ' + types + ' 个';
      })
      .catch(e => {
        document.getElementById('configTest').innerHTML = 
          '<span class="error">❌ 配置加载失败: ' + e.message + '</span>';
      });

    // 浏览器信息
    document.getElementById('browserInfo').innerHTML = 
      'User Agent: ' + navigator.userAgent + '<br>' +
      'Language: ' + navigator.language + '<br>' +
      'Online: ' + (navigator.onLine ? '✅ 是' : '❌ 否');
  </script>
</body>
</html>
